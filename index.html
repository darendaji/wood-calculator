<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>木材计算器 - 木工必备工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #8B4513 0%, #D2691E 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .logo-icon {
            font-size: 50px;
        }
        
        h1 {
            text-align: center;
            color: #8B4513;
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .subtitle {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-bottom: 30px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: #333;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #D2691E;
        }
        
        .row {
            display: flex;
            gap: 10px;
        }
        
        .row .input-group {
            flex: 1;
        }
        
        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #8B4513, #D2691E);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .result {
            margin-top: 30px;
            padding: 20px;
            background: #FFF8F0;
            border-radius: 15px;
            display: none;
        }
        
        .result.show {
            display: block;
        }
        
        .result-title {
            color: #8B4513;
            font-size: 16px;
            margin-bottom: 15px;
            font-weight: bold;
        }
        
        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px dashed #eee;
        }
        
        .result-item:last-child {
            border-bottom: none;
        }
        
        .result-label {
            color: #666;
        }
        
        .result-value {
            color: #8B4513;
            font-weight: bold;
            font-size: 18px;
        }
        
        .total {
            margin-top: 15px;
            padding: 15px;
            background: #8B4513;
            color: white;
            border-radius: 10px;
            text-align: center;
        }
        
        .total-label {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .total-value {
            font-size: 28px;
            font-weight: bold;
            margin-top: 5px;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-icon">🪵</div>
        </div>
        <h1>木材计算器</h1>
        <p class="subtitle">木工必备 · 精准计算 · 省钱省料</p>
        
        <div class="input-group">
            <label>房间长度（米）</label>
            <input type="number" id="length" placeholder="例如：5" step="0.1">
        </div>
        
        <div class="row">
            <div class="input-group">
                <label>宽度（米）</label>
                <input type="number" id="width" placeholder="例如：4" step="0.1">
            </div>
            <div class="input-group">
                <label>高度（米）</label>
                <input type="number" id="height" placeholder="例如：3" step="0.1">
            </div>
        </div>
        
        <div class="input-group">
            <label>木材单价（元/㎡）</label>
            <input type="number" id="price" placeholder="例如：150" step="1" value="150">
        </div>
        
        <button onclick="calculate()">🧮 立即计算</button>
        
        <div class="result" id="result">
            <div class="result-title">📊 计算结果</div>
            
            <div class="result-item">
                <span class="result-label">地面面积</span>
                <span class="result-value" id="floorArea">-</span>
            </div>
            
            <div class="result-item">
                <span class="result-label">墙面面积</span>
                <span class="result-value" id="wallArea">-</span>
            </div>
            
            <div class="result-item">
                <span class="result-label">所需木材</span>
                <span class="result-value" id="woodNeeded">-</span>
            </div>
            
            <div class="total">
                <div class="total-label">预估总成本</div>
                <div class="total-value" id="totalCost">-</div>
            </div>
        </div>
        
        <div class="footer">
            木材计算器 v1.0 · 离线可用
        </div>
    </div>
    
    <script>
        function calculate() {
            const length = parseFloat(document.getElementById('length').value) || 0;
            const width = parseFloat(document.getElementById('width').value) || 0;
            const height = parseFloat(document.getElementById('height').value) || 0;
            const price = parseFloat(document.getElementById('price').value) || 150;
            
            if (length <= 0 || width <= 0) {
                alert('请输入有效的房间尺寸！');
                return;
            }
            
            // 计算地面面积
            const floorArea = length * width;
            
            // 计算墙面面积（四面墙）
            const wallArea = 2 * (length + width) * height;
            
            // 总面积
            const totalArea = floorArea + wallArea;
            
            // 预估木材（含10%损耗）
            const woodNeeded = totalArea * 1.1;
            
            // 总成本
            const totalCost = woodNeeded * price;
            
            // 显示结果
            document.getElementById('floorArea').textContent = floorArea.toFixed(2) + ' ㎡';
            document.getElementById('wallArea').textContent = wallArea.toFixed(2) + ' ㎡';
            document.getElementById('woodNeeded').textContent = woodNeeded.toFixed(2) + ' ㎡';
            document.getElementById('totalCost').textContent = '¥' + totalCost.toFixed(0);
            
            document.getElementById('result').classList.add('show');
        }
    </script>
</body>
</html>
